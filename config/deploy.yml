# Name of your application. Used to uniquely configure containers.
service: rails_template

# Name of the container image.
image: railstemplate/rails_template

# Deploy to these servers.
servers:
  web:
    - 192.168.0.1
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
proxy:
  ssl: true
  host: railstemplate2026.com.br

# Docker Hub registry configuration.
registry:
  server: docker.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - DATABASE_URL
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    # When you start using multiple servers, you should split out job processing to a dedicated machine.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of cores available to the application on each server (default: 1).
    WEB_CONCURRENCY: 2

    # Database host - uses the accessory container via Kamal's Docker network.
    DB_HOST: rails_template-db

    # Application host for mailers and URL generation
    APP_HOST: railstemplate2026.com.br
    APP_PROTOCOL: https

    # Log level
    RAILS_LOG_LEVEL: info

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for local Active Storage files.
volumes:
  - "rails_template_storage:/rails/storage"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# Accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:16
    host: 192.168.0.1
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: rails_template_production
        POSTGRES_USER: rails_template
      secret:
        - POSTGRES_PASSWORD
    directories:
      - postgres-data:/var/lib/postgresql/data
    options:
      restart: unless-stopped
      memory: 1g

  redis:
    image: redis:7-alpine
    host: 192.168.0.1
    port: "127.0.0.1:6379:6379"
    directories:
      - redis-data:/data
    cmd: redis-server --appendonly yes
    options:
      restart: unless-stopped
      memory: 512m

# Use a different ssh user than root
# ssh:
#   user: app
