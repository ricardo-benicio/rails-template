test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Supabase Storage (S3-compatible)
# Configure via environment variables
supabase:
  service: S3
  endpoint: <%= "#{ENV.fetch('SUPABASE_URL', '')}/storage/v1/s3" %>
  access_key_id: <%= ENV.fetch("SUPABASE_SERVICE_ROLE_KEY", "") %>
  secret_access_key: <%= ENV.fetch("SUPABASE_SERVICE_ROLE_KEY", "") %>
  region: auto
  bucket: <%= ENV.fetch("SUPABASE_STORAGE_BUCKET", "uploads") %>
  force_path_style: true
  public: false

# For direct S3 uploads (if not using Supabase)
