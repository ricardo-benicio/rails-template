---
pt-BR:
  activerecord:
    errors:
      messages:
        record_invalid: "A validação falhou: %{errors}"
        restrict_dependent_destroy:
          has_one: "Não é possível excluir o registro pois existe um %{record} dependente"
          has_many: "Não é possível excluir o registro pois existem %{record} dependentes"
      models: {}
      attributes: {}
    models: {}
    attributes: {}

  date:
    abbr_day_names:
      - dom
      - seg
      - ter
      - qua
      - qui
      - sex
      - sáb
    abbr_month_names:
      - ~
      - jan
      - fev
      - mar
      - abr
      - mai
      - jun
      - jul
      - ago
      - set
      - out
      - nov
      - dez
    day_names:
      - domingo
      - segunda-feira
      - terça-feira
      - quarta-feira
      - quinta-feira
      - sexta-feira
      - sábado
    formats:
      default: "%d/%m/%Y"
      long: "%d de %B de %Y"
      short: "%d de %B"
    month_names:
      - ~
      - janeiro
      - fevereiro
      - março
      - abril
      - maio
      - junho
      - julho
      - agosto
      - setembro
      - outubro
      - novembro
      - dezembro
    order:
      - :day
      - :month
      - :year

  datetime:
    distance_in_words:
      about_x_hours:
        one: aproximadamente %{count} hora
        other: aproximadamente %{count} horas
      about_x_months:
        one: aproximadamente %{count} mês
        other: aproximadamente %{count} meses
      about_x_years:
        one: aproximadamente %{count} ano
        other: aproximadamente %{count} anos
      almost_x_years:
        one: quase %{count} ano
        other: quase %{count} anos
      half_a_minute: meio minuto
      less_than_x_seconds:
        one: menos de %{count} segundo
        other: menos de %{count} segundos
      less_than_x_minutes:
        one: menos de um minuto
        other: menos de %{count} minutos
      over_x_years:
        one: mais de %{count} ano
        other: mais de %{count} anos
      x_seconds:
        one: "%{count} segundo"
        other: "%{count} segundos"
      x_minutes:
        one: "%{count} minuto"
        other: "%{count} minutos"
      x_days:
        one: "%{count} dia"
        other: "%{count} dias"
      x_months:
        one: "%{count} mês"
        other: "%{count} meses"
      x_years:
        one: "%{count} ano"
        other: "%{count} anos"
    prompts:
      second: segundo
      minute: minuto
      hour: hora
      day: dia
      month: mês
      year: ano

  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: precisa ser aceito
      blank: não pode ficar em branco
      confirmation: não é igual a %{attribute}
      empty: não pode ficar vazio
      equal_to: precisa ser igual a %{count}
      even: precisa ser par
      exclusion: não está disponível
      greater_than: precisa ser maior que %{count}
      greater_than_or_equal_to: precisa ser maior ou igual a %{count}
      in: precisa estar em %{count}
      inclusion: não está incluído na lista
      invalid: não é válido
      less_than: precisa ser menor que %{count}
      less_than_or_equal_to: precisa ser menor ou igual a %{count}
      model_invalid: "A validação falhou: %{errors}"
      not_a_number: não é um número
      not_an_integer: não é um número inteiro
      odd: precisa ser ímpar
      other_than: precisa ser diferente de %{count}
      present: precisa estar em branco
      required: é obrigatório(a)
      taken: já está em uso
      too_long:
        one: 'é muito longo (máximo: %{count} caractere)'
        other: 'é muito longo (máximo: %{count} caracteres)'
      too_short:
        one: 'é muito curto (mínimo: %{count} caractere)'
        other: 'é muito curto (mínimo: %{count} caracteres)'
      wrong_length:
        one: 'não possui o tamanho esperado (%{count} caractere)'
        other: 'não possui o tamanho esperado (%{count} caracteres)'
    template:
      body: 'Por favor, verifique o(s) seguinte(s) campo(s):'
      header:
        one: 'Não foi possível gravar %{model}: %{count} erro'
        other: 'Não foi possível gravar %{model}: %{count} erros'

  helpers:
    select:
      prompt: 'Por favor selecione'
    submit:
      create: Criar
      submit: Salvar
      update: Atualizar

  number:
    currency:
      format:
        delimiter: "."
        format: "%u %n"
        precision: 2
        separator: ","
        significant: false
        strip_insignificant_zeros: false
        unit: R$
    format:
      delimiter: "."
      precision: 3
      round_mode: default
      separator: ","
      significant: false
      strip_insignificant_zeros: false
    human:
      decimal_units:
        format: "%n %u"
        units:
          billion: bilhões
          million: milhões
          quadrillion: quatrilhões
          thousand: mil
          trillion: trilhões
          unit: ''
      format:
        delimiter: ''
        precision: 3
        significant: true
        strip_insignificant_zeros: true
      storage_units:
        format: "%n %u"
        units:
          byte:
            one: byte
            other: bytes
          eb: EB
          gb: GB
          kb: KB
          mb: MB
          pb: PB
          tb: TB
          zb: ZB
    percentage:
      format:
        delimiter: "."
        format: "%n%"
    precision:
      format:
        delimiter: "."

  support:
    array:
      last_word_connector: " e "
      two_words_connector: " e "
      words_connector: ", "

  time:
    am: ''
    formats:
      default: "%A, %d de %B de %Y, %H:%M h"
      long: "%d de %B de %Y, %H:%M"
      short: "%d de %B, %H:%M"
    pm: ''

  # Application specific translations
  app:
    name: Rails Template
    description: Template base para aplicações Rails
